# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Detect security vulnerabilities and unmaintained crates from the RustSec
# advisory database. Defaults error on vulnerabilities.
version = 2

[licenses]
# format-bom is licensed "MIT OR Apache-2.0", so only allow permissive
# licenses for dependencies. Anything not in this list fails the check.
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]

[bans]
# Small project: warn on duplicate dependency versions rather than fail.
multiple-versions = "warn"

[sources]
# Only allow crates from crates.io.
unknown-registry = "deny"
unknown-git = "deny"
